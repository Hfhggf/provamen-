<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Bar Papà - Ordina dal Tavolo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        header { background: #111; color: white; padding: 20px; text-align: center; }
        h1 { margin: 0; }
        .container { max-width: 600px; margin: 30px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        label { font-weight: bold; }
        input[type="number"] { width: 100%; padding: 10px; margin: 10px 0 20px 0; border-radius: 6px; border: 1px solid #ccc; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .menu-item input { width: 60px; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        button:hover { background: #218838; }
        .result { margin-top: 20px; background: #e9ffe9; padding: 10px; border-radius: 6px; display: none; white-space: pre-line; }
    </style>
</head>
<body>

<header>
    <h1>🍹 Bar Papà</h1>
    <p>Ordina comodamente dal tuo tavolo</p>
</header>

<div class="container">
    <label>Numero Tavolo:</label>
    <input type="number" id="tavolo" placeholder="Es. 5">

    <h3>Menù</h3>

    <div class="menu-item">
        <span>🍕 Pizza Margherita - €8</span>
        <input type="number" min="0" value="0" id="pizza">
    </div>

    <div class="menu-item">
        <span>🍔 Panino Hamburger - €7</span>
        <input type="number" min="0" value="0" id="panino">
    </div>

    <div class="menu-item">
        <span>🥗 Insalata - €6</span>
        <input type="number" min="0" value="0" id="insalata">
    </div>

    <div class="menu-item">
        <span>🥤 Coca Cola - €3</span>
        <input type="number" min="0" value="0" id="coca">
    </div>

    <div class="menu-item">
        <span>🍰 Tiramisu - €5</span>
        <input type="number" min="0" value="0" id="tiramisu">
    </div>

    <button onclick="inviaOrdine()">🚀 Invia Ordine</button>
    <div class="result" id="result"></div>
</div>

<script>
async function inviaOrdine() {
    const tavolo = document.getElementById("tavolo").value;
    const items = {
        "Pizza": document.getElementById("pizza").value,
        "Panino": document.getElementById("panino").value,
        "Insalata": document.getElementById("insalata").value,
        "Coca Cola": document.getElementById("coca").value,
        "Tiramisu": document.getElementById("tiramisu").value
    };

    if (!tavolo) {
        alert("Inserisci il numero del tavolo!");
        return;
    }

    let ordineTesto = `📝 *NUOVO ORDINE*\n📍 *Tavolo:* ${tavolo}\n------------------\n`;
    let haSelezionato = false;

    for (let nome in items) {
        if (items[nome] > 0) {
            ordineTesto += `• ${nome}: ${items[nome]}\n`;
            haSelezionato = true;
        }
    }

    if (!haSelezionato) {
        alert("Non hai selezionato nulla!");
        return;
    }

    // Chiamata alla funzione segreta su Vercel
    try {
        const response = await fetch("/api/ordine", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messaggio: ordineTesto })
        });

        if (response.ok) {
            alert("✅ Ordine inviato a papà!");
            // Reset campi
            document.querySelectorAll('input[type="number"]').forEach(input => input.value = 0);
        } else {
            alert("❌ Errore durante l'invio. Controlla le impostazioni di Vercel.");
        }
    } catch (error) {
        alert("❌ Errore di connessione.");
    }
}
</script>

</body>
</html>
